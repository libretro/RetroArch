name: CI Switch/libnx

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

permissions:
  contents: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: reallibretroretroarch/libretro-build-libnx-devkitpro:v4-10-0
      options: --user root

    steps:
    - uses: actions/checkout@v3

    - name: Compile RA
      run: |
        make -f Makefile.libnx -j$(getconf _NPROCESSORS_ONLN) clean
        make -f Makefile.libnx -j$(getconf _NPROCESSORS_ONLN) HAVE_STATIC_DUMMY=1
    - name: Get short SHA
      id: slug
      run: echo "::set-output name=sha8::$(echo ${GITHUB_SHA} | cut -c1-8)"

    - uses: actions/upload-artifact@v4
      with:
        name: RA-libnx-dummy-${{ steps.slug.outputs.sha8 }}
        path: |
          retroarch_switch.nro
